modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    description = '''
${mod_description}
'''
    authors = "${mod_authors}"
    logoFile = "icon.png"
    logoBlur = false
    [[mods.dependencies.${mod_id}]]
        modId = "neoforge"
        type = "required"
        versionRange = "${neoforge_version_range}"
        ordering = "NONE"
        side = "BOTH"
    [[mods.dependencies.${mod_id}]]
        modId = "minecraft"
        type = "required"
        versionRange = "${minecraft_version_range}"
        ordering = "NONE"
        side = "BOTH"

[[mixins]]
    config = "animalweights.mixins.json"
