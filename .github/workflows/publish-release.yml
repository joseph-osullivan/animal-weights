name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)publish (must already exist)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ./gradlew build

      - name: Publish to Modrinth and CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: build/libs/animal-weights-*.jar
          name: ${{ github.event.release.name || format('Animal Weights {0}', github.event.inputs.tag) }}
          version: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          version-type: release
          changelog: ${{ github.event.release.body }}

          loaders: neoforge
          game-versions: |
            26.1.2
          game-version-filter: releases
          java: |
            25

          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn
